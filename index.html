<script>
// ── LIVE DATA ─────────────────────────────────────────────────
// Data loaded from Google Sheets via gviz on page load.
// Do not edit here — update the sheet; Apps Script syncs hourly.
var R        = [];
var COMPS    = [];
var MO_DATA  = [];
var MO       = ["Apr","May","Jun"];

var SHEET_ID = '1avGHu-hPMwM1XMsVIJaSP1ZUIlNwWLoyRCRYdRvgxWU';
var DATA_LOADED = false;

function gvizFetch(tabName) {
  return fetch('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(tabName) + '&headers=1')
    .then(function(r) { return r.text(); })
    .then(function(t) {
      var j = JSON.parse(t.substring(t.indexOf('{'), t.lastIndexOf('}') + 1));
      var cols = j.table.cols.map(function(c) { return c.label; });
      return (j.table.rows || []).map(function(row) {
        var obj = {};
        row.c.forEach(function(cell, i) { obj[cols[i]] = cell ? cell.v : null; });
        return obj;
      });
    });
}

function buildRArray(rows) {
  var EXCL=['africa brown','myranda grabman'];
  return rows.filter(function(row) { return row.Name && row.Total_Calls > 0 && EXCL.indexOf((row.Name||'').toLowerCase()) < 0; })
    .map(function(row, i) {
      var monthAvgs  = [row.May_Avg, row.Jun_Avg, row.Jul_Avg, null];
      var gaps = [row.Gap1, row.Gap2, row.Gap3].filter(Boolean);
      if (!gaps.length) gaps = ['Limited data', 'Limited data', 'Limited data'];
      // Auto-generate themes from gap criteria names
      var themes = gaps.slice(0, 2).map(function(g) {
        var n = g.split(' (')[0];
        var parts = n.split(' - ');
        return parts[0] + (parts.length > 1 ? ' - ' + parts[1] : '');
      });
      if (!themes.length) themes = ['General coaching'];
      // Auto-generate actions from gap criteria
      var actions = gaps.slice(0, 2).map(function(g) {
        var n = g.split(' (')[0];
        var parts = n.split(' - ');
        return (parts[parts.length - 1] || n) + ' coaching';
      });
      if (!actions.length) actions = ['Continue coaching'];
      var objScore   = row.Obj_Score   != null ? Math.round(row.Obj_Score   * 100) / 100 : null;
      var priceScore = row.Price_Score != null ? Math.round(row.Price_Score * 100) / 100 : null;
      var mayCalls = row.May_Calls || 0;
      var junCalls = row.Jun_Calls || 0;
      var julCalls = row.Jul_Calls || 0;
      function stg(v) { return v != null ? Math.round(v * 100) / 100 : null; }
      return {
        id:    i + 1,
        n:     row.Name    || '',
        r:     row.Role    || '',
        mg:    row.Manager || '',
        total: row.Total_Calls || 0,
        exc:  row.Exc_Calls  || 0,
        imp:  row.Imp_Calls  || 0,
        flat: row.Flat_Calls || 0,
        nw:   row.NW_Calls   || 0,
        avg:   row.Avg_Score ? Math.round(row.Avg_Score * 100) / 100 : 0,
        gaps:  gaps,
        trend: monthAvgs,
        tl:    row.Trend_Label || 'New',
        calls: row.Total_Calls || 0,
        themes:  themes,
        actions: actions,
        obj: {
          tier:  row.Obj_Tier  || '—',
          score: objScore,
          type:  row.Obj_Scorecards || (objScore ? 'Objection Handling' : 'No data'),
        },
        price: {
          score: priceScore,
          tier:  row.Price_Tier || null,
        },
        vol: {
          total: mayCalls + junCalls + julCalls,
          mo:    [mayCalls || null, junCalls || null, julCalls || null, null],
          eff:   row.Trend_Label || '',
        },
        callTypes: {
          cc:   { score: stg(row.CC_Score),   calls: row.CC_Calls   || 0 },
          disc: { score: stg(row.Disc_Score), calls: row.Disc_Calls || 0 },
          demo: { score: stg(row.Demo_Score), calls: row.Demo_Calls || 0 },
        },
      };
    });
}

function buildComps(critRows) {
  return critRows
    .filter(function(r) { return r.Type === 'gap' || r.Type === 'str'; })
    .map(function(r) {
      return {
        n: r.Criteria_Name,
        a: r.Team_Avg != null ? Math.round(r.Team_Avg * 100) / 100 : 0,
        t: r.Type,
        d: (r.Rep_Count || 0) + ' rep' + (r.Rep_Count !== 1 ? 's' : '') + ' scored on team.',
      };
    });
}

function buildMoData(repRows) {
  var months = [
    { label: 'May',  avgKey: 'May_Avg', callsKey: 'May_Calls' },
    { label: 'June', avgKey: 'Jun_Avg', callsKey: 'Jun_Calls' },
    { label: 'July', avgKey: 'Jul_Avg', callsKey: 'Jul_Calls' },
  ];
  return months.map(function(mo) {
    // Use calls count if available; fall back to any rep with an avg score for that month
    var repsWithCalls = repRows.filter(function(r) { return (r[mo.callsKey] || 0) > 0; });
    if (!repsWithCalls.length) repsWithCalls = repRows.filter(function(r) { return r[mo.avgKey] != null; });
    if (!repsWithCalls.length) return { m: mo.label, a: null, s: null, w: null };
    var scores    = repsWithCalls.map(function(r) { return r[mo.avgKey]; }).filter(function(x) { return x != null; });
    if (!scores.length) return { m: mo.label, a: null, s: null, w: null };
    var teamAvg   = Math.round((scores.reduce(function(s, x) { return s + x; }, 0) / scores.length) * 100) / 100;
    var strong    = repsWithCalls.filter(function(r) { return r[mo.avgKey] >= 3.0; }).length;
    var weak      = repsWithCalls.filter(function(r) { return r[mo.avgKey] < 2.5; }).length;
    return {
      m: mo.label,
      a: teamAvg,
      s: repsWithCalls.length ? Math.round(strong / repsWithCalls.length * 100) : null,
      w: repsWithCalls.length ? Math.round(weak   / repsWithCalls.length * 100) : null,
    };
  });
}

function loadDashboardData(cb) {
  document.getElementById('main').innerHTML = '<div style="text-align:center;padding:60px;color:#6b7a88"><div style="font-size:24px;margin-bottom:12px">⟳</div><div style="font-size:13px">Loading live data from Attention...</div></div>';
  Promise.all([
    gvizFetch('RepMetrics'),
    gvizFetch('CriteriaMetrics'),
    gvizFetch('CallFeedback'),
  ]).then(function(results) {
    var repRows  = results[0];
    var critRows = results[1];
    var callRows = results[2] || [];
    R       = buildRArray(repRows);
    COMPS   = buildComps(critRows);
    MO_DATA = buildMoData(repRows);
    // Support both original lowercase headers (rep, callUrl) and underscore variants
    CALLS   = callRows.filter(function(r){ return r && (r.rep || r.Rep_Name || r['Rep Name']); });
    DATA_LOADED = true;
    loadReps();
    if (cb) cb();
  }).catch(function(err) {
    console.error('Dashboard data load failed:', err);
    DATA_LOADED = true;
    loadReps();
    if (cb) cb();
  });
}

function sc(v){return v>=3?"#0f7b5f":v>=2.7?"#2563a8":v>=2.5?"#a07d0a":"#b83b3b"}
function scBg(v){return v>=3?"#1a6b54":v>=2.7?"#1e3a6f":v>=2.5?"#6b5a0a":"#6b1d1d"}
function pct(n,t){return t?Math.round(n/t*100):0}
function hu(n){return n.split("").reduce(function(a,c){return a+c.charCodeAt(0)},0)%360}
function ini(n){return n.split(" ").map(function(w){return w[0]}).join("")}
function av(n,z){return'<div class="av" style="width:'+z+'px;height:'+z+'px;font-size:'+(z*.36)+'px;background:hsl('+hu(n)+',35%,42%)">'+ini(n)+'</div>'}
function spark(data,w,h){w=w||100;h=h||28;var v=data.map(function(val,i){return val!==null?{v:val,i:i}:null}).filter(Boolean);if(v.length<2)return'<span style="font-size:11px;color:#b0bcc6">—</span>';var mn=Math.min.apply(null,v.map(function(d){return d.v}))-0.1,mx=Math.max.apply(null,v.map(function(d){return d.v}))+0.1;var pts=v.map(function(d){return((d.i/3)*(w-4)+2)+","+(h-2-((d.v-mn)/(mx-mn))*(h-4))}).join(" ");var last=v[v.length-1].v,first=v[0].v,col=last>first?"#0f7b5f":last<first?"#b83b3b":"#6b7a88";var dots=v.map(function(d,i){var x=(d.i/3)*(w-4)+2,y=h-2-((d.v-mn)/(mx-mn))*(h-4);return'<circle cx="'+x+'" cy="'+y+'" r="'+(i===v.length-1?3:1.5)+'" fill="'+col+'"/>'}).join("");return'<svg class="spark" width="'+w+'" height="'+h+'"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+dots+'</svg>'}

// ── MINI DONUT ── 4 segments: Strong (green) / Improving (teal) / Flat (amber) / Needs Attention (red)
function miniDonut(exc, imp, flat, nw, size) {
  size = size || 44;
  var total = exc + imp + flat + nw;
  if (!total) return '<span style="font-size:11px;color:#b0bcc6">—</span>';
  var r = size * 0.36, cx = size / 2, cy = size / 2, sw = size * 0.14;
  var circ = 2 * Math.PI * r;
  var segs = [
    { v: exc,  col: '#0f7b5f', label: 'Strong (≥4.0)' },
    { v: imp,  col: '#2563a8', label: 'Improving (3.0–3.99)' },
    { v: flat, col: '#a07d0a', label: 'Flat (2.5–2.99)' },
    { v: nw,   col: '#b83b3b', label: 'Needs Attention (<2.5)' },
  ];
  var offset = 0;
  var paths = segs.map(function(s) {
    if (!s.v) return '';
    var dash = (s.v / total) * circ;
    var o = offset;
    offset += dash;
    var pctSeg = Math.round(s.v / total * 100);
    return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.col+'" stroke-width="'+sw+'" stroke-dasharray="'+dash+' '+(circ-dash)+'" stroke-dashoffset="'+(-(o))+'" transform="rotate(-90 '+cx+' '+cy+')" stroke-linecap="butt"><title>'+s.label+': '+s.v+' calls ('+pctSeg+'%)</title></circle>';
  }).join('');
  var best = segs.reduce(function(a,b){return b.v>a.v?b:a});
  var pct = Math.round(best.v/total*100);
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="flex-shrink:0;cursor:default">'
    +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#e8eaec" stroke-width="'+sw+'"/>'
    +paths
    +'<text x="'+cx+'" y="'+(cy+3)+'" text-anchor="middle" font-size="'+(size*0.22)+'px" font-weight="700" fill="'+best.col+'">'+pct+'%</text>'
    +'</svg>';
}

function showCallTier(repName, tier) {
  // tier: 'exc' | 'good' | 'nw'
  var lo = tier==='exc' ? 4.0 : tier==='good' ? 2.5 : 0;
  var hi = tier==='exc' ? 9   : tier==='good' ? 4.0 : 2.5;
  var lbl= tier==='exc' ? 'Excellent' : tier==='good' ? 'Good' : 'Needs Work';
  var col= tier==='exc' ? '#1a6b54'   : tier==='good' ? '#2563a8' : '#b83b3b';
  // Try both possible name formats from the sheet
  var repCalls = CALLS.filter(function(c){
    // Sheet headers: rep, callUrl, score (lowercase) — support both formats
    var name = (c.rep || c.Rep_Name || c['Rep Name'] || '').toLowerCase().trim();
    var sc   = parseFloat(c.score || c.Score || 0);
    return name === repName.toLowerCase().trim() && sc >= lo && sc < hi;
  }).sort(function(a,b){
    var sa=parseFloat(a.score||a.Score||0), sb=parseFloat(b.score||b.Score||0);

    var sc   = parseFloat(c.score || c.Score || 0);

else if(coachV==="byRep"){var m={};fl.forEach(function(x){if(!m[x.rep])m[x.rep]=[];m[x.rep].push(x)});Object.keys(m).sort().forEach(function(rep){var entries=m[rep].sort(function(a,b){return new Date(b.date)-new Date(a.date)});var emp=R.find(function(r){return r.n===rep});h+='<div class="rc" style="border-left:4px solid #1a6b54"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'+av(rep,36)+'<div style="flex:1"><div style="font-size:15px;font-weight:700;color:#1e2b35">'+rep+'</div><div style="font-size:12px;color:#6b7a88">'+entries.length+' sessions'+(emp?' · '+emp.r+' · '+(emp.mg||"—"):'')+'</div></div><button class="bt bg bs" onclick="clAd(\''+rep.replace(/'/g,"\\'")+'\')"">+ Add</button></div>';entries.forEach(function(x){h+=rLogEntry(x)});h+='</div>'})}
else if(coachV==="open"){var open=fl.filter(function(x){return x.stat==="Open"}).sort(function(a,b){var p={Urgent:0,Priority:1,Routine:2};return(p[a.pri]||2)-(p[b.pri]||2)});open.forEach(function(x){h+=rLogEntry(x)});if(!open.length)h+='<div class="emp">No open actions!</div>'}
else if(coachV==="stats"){
var rs={};CL.forEach(function(x){if(!rs[x.rep])rs[x.rep]={n:x.rep,tot:0,op:0,urg:0,last:""};rs[x.rep].tot++;if(x.stat==="Open")rs[x.rep].op++;if(x.pri==="Urgent"&&x.stat==="Open")rs[x.rep].urg++;if(!rs[x.rep].last||new Date(x.date)>new Date(rs[x.rep].last))rs[x.rep].last=x.date});
var stats=Object.values(rs).sort(function(a,b){return b.tot-a.tot});
var noCoach=R.filter(function(r){return r.total>0&&!stats.find(function(s){return s.n===r.n})});
h+='<div class="tw"><table><thead><tr><th>Rep</th><th>Role</th><th>Manager</th><th>Sessions</th><th>Open</th><th>Last</th><th>Days Since</th></tr></thead><tbody>';
stats.forEach(function(s){var ds=s.last?daysSince(s.last):"—";var emp=R.find(function(r){return r.n===s.n});h+='<tr style="cursor:pointer" onclick="coachV=\'byRep\';document.getElementById(\'search\').value=\''+s.n.split(' ')[0]+'\';render()"><td><div class="nc">'+av(s.n,26)+'<span style="font-weight:600;font-size:12px;color:#1e2b35">'+s.n+'</span></div></td><td style="font-size:11px">'+(emp?emp.r:"—")+'</td><td style="font-size:11px">'+(emp?emp.mg||"—":"—")+'</td><td style="font-weight:700">'+s.tot+'</td><td style="color:'+(s.op?"#b83b3b":"#0f7b5f")+';font-weight:600">'+s.op+'</td><td style="font-size:11px">'+s.last+'</td><td style="font-weight:600;color:'+(typeof ds==="number"&&ds>14?"#b83b3b":"#0f7b5f")+'">'+ds+'</td></tr>'});
h+='</tbody></table></div>';
if(noCoach.length){h+='<div class="rc" style="border-left:4px solid #b83b3b;margin-top:16px"><div style="font-size:14px;font-weight:700;color:#b83b3b;margin-bottom:8px">Not Yet Coached ('+noCoach.length+')</div><div style="display:flex;flex-wrap:wrap;gap:8px">';noCoach.forEach(function(r){h+='<div style="display:flex;align-items:center;gap:6px;background:#fde8e8;padding:6px 12px;border-radius:10px;font-size:12px;font-weight:500;color:#7a2222">'+av(r.n,22)+r.n+'</div>'});h+='</div></div>'}}
if(!fl.length&&coachV!=="stats")h+='<div class="emp">No sessions found.</div>';
return h}

// LOG CRUD
function modal(h){document.getElementById("mw").innerHTML='<div class="mbg" onclick="if(event.target===this)clMo()"><div class="mdl" onclick="event.stopPropagation()">'+h+'</div></div>';document.getElementById("mw").style.display="block"}
function clMo(){document.getElementById("mw").style.display="none"}
var clEI=null;
function clAd(rep){clEI=null;var names=R.map(function(r){return r.n}).sort();var h='<h2>New 1:1 Session</h2><div class="fr"><div class="fg"><label>Rep</label><select id="cl-r">';names.forEach(function(n){h+='<option'+(n===rep?' selected':'')+'>'+n+'</option>'});h+='</select></div><div class="fg"><label>Date</label><input id="cl-d" value="'+new Date().toLocaleDateString("en-US")+'"/></div></div><div class="fg"><label>Purpose</label><input id="cl-p" placeholder="e.g. Discovery Skills Review"/></div><div class="fr3"><div class="fg"><label>Priority</label><select id="cl-pr"><option>Routine</option><option>Priority</option><option>Urgent</option></select></div><div class="fg"><label>Coach</label><input id="cl-c" value="Terry"/></div><div class="fg"><label>Follow-up</label><input id="cl-f" placeholder="4/15/2026"/></div></div><div class="fg"><label>Action Items</label><textarea id="cl-a" placeholder="Actions agreed upon..."></textarea></div><div class="fg"><label>Notes</label><textarea id="cl-n" placeholder="Session notes..."></textarea></div><div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="clSv()">Save</button><button class="bt bo" onclick="clMo()">Cancel</button></div>';modal(h)}
function clEd(id){clEI=id;var x=CL.find(function(e){return e.id===id});if(!x)return;var names=R.map(function(r){return r.n}).sort();var h='<h2>Edit Session</h2><div class="fr"><div class="fg"><label>Rep</label><select id="cl-r">';names.forEach(function(n){h+='<option'+(n===x.rep?' selected':'')+'>'+n+'</option>'});h+='</select></div><div class="fg"><label>Date</label><input id="cl-d" value="'+x.date+'"/></div></div><div class="fg"><label>Purpose</label><input id="cl-p" value="'+(x.purp||"").replace(/"/g,"&quot;")+'"/></div><div class="fr3"><div class="fg"><label>Priority</label><select id="cl-pr"><option'+(x.pri==="Routine"?" selected":"")+'>Routine</option><option'+(x.pri==="Priority"?" selected":"")+'>Priority</option><option'+(x.pri==="Urgent"?" selected":"")+'>Urgent</option></select></div><div class="fg"><label>Coach</label><input id="cl-c" value="'+x.coach+'"/></div><div class="fg"><label>Follow-up</label><input id="cl-f" value="'+(x.fu||"")+'"/></div></div><div class="fg"><label>Status</label><select id="cl-s"><option'+(x.stat==="Open"?" selected":"")+'>Open</option><option'+(x.stat==="Complete"?" selected":"")+'>Complete</option></select></div><div class="fg"><label>Action Items</label><textarea id="cl-a">'+(x.act||"")+'</textarea></div><div class="fg"><label>Notes</label><textarea id="cl-n">'+(x.notes||"")+'</textarea></div><div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="clSv()">Save</button><button class="bt bo" onclick="clMo()">Cancel</button></div>';modal(h)}
function clSv(){var rep=document.getElementById("cl-r").value,date=document.getElementById("cl-d").value.trim(),purp=document.getElementById("cl-p").value.trim(),pri=document.getElementById("cl-pr").value,coach=document.getElementById("cl-c").value.trim(),fu=document.getElementById("cl-f").value.trim(),act=document.getElementById("cl-a").value.trim(),notes=document.getElementById("cl-n").value.trim(),stEl=document.getElementById("cl-s"),stat=stEl?stEl.value:"Open";if(!purp){alert("Enter purpose.");return}if(clEI!==null){var x=CL.find(function(e){return e.id===clEI});if(x){x.rep=rep;x.date=date;x.purp=purp;x.pri=pri;x.coach=coach;x.fu=fu;x.act=act;x.notes=notes;x.stat=stat;clUpdateCloud(x)}clEI=null}else{var entry={id:clNxt++,rep:rep,date:date,purp:purp,pri:pri,coach:coach,fu:fu,act:act,notes:notes,stat:"Open"};CL.push(entry);clAddCloud(entry)}clSave();clMo();render()}
function clDl(id){var x=CL.find(function(e){return e.id===id});if(x&&confirm("Delete: "+x.purp+"?")){CL=CL.filter(function(e){return e.id!==id});clDeleteCloud(id);clSave();render()}}
function clMk(id,st){var x=CL.find(function(e){return e.id===id});if(x){x.stat=st;clUpdateCloud(x);clSave();render()}}
function clFu(id){var x=CL.find(function(e){return e.id===id});if(!x)return;clAd(x.rep);setTimeout(function(){document.getElementById("cl-p").value="Follow-up: "+x.purp;document.getElementById("cl-c").value=x.coach},50)}

// ===== SEARCH PROFILE =====
function rProfile(r){
var h='<div class="rc" style="border-left:4px solid #1a6b54"><div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">'+av(r.n,48)+'<div style="flex:1"><div style="font-size:20px;font-weight:700;color:#1a6b54">'+r.n+'</div><div style="font-size:12px;color:#5a6b7a">'+r.r+' · '+(r.mg||"—")+' · '+r.total+' calls · '+r.opps+' opps · '+r.tl+'</div></div><div style="display:flex;gap:6px;align-items:center"><button class="bt bb2 bs" onclick="edRep('+r.id+')">Edit Profile</button><div style="font-size:32px;font-weight:800;color:'+sc(r.avg)+'">'+r.avg+'</div></div></div>';
h+='<div class="cards" style="margin-bottom:14px"><div class="cd"><div class="cd-v" style="font-size:18px;color:#1e2b35">'+r.total+'</div><div class="cd-l">Calls</div></div><div class="cd"><div class="cd-v" style="font-size:18px;color:'+sc(r.avg)+'">'+r.avg+'</div><div class="cd-l">Avg</div></div><div class="cd"><div class="cd-v" style="font-size:18px;color:#2563a8">'+r.opps+'</div><div class="cd-l">Opps</div></div>'+(r.obj.score?'<div class="cd"><div class="cd-v" style="font-size:18px;color:'+sc(r.obj.score)+'">'+r.obj.score+'</div><div class="cd-l">Objection</div></div>':'')+(r.price.score?'<div class="cd"><div class="cd-v" style="font-size:18px;color:'+sc(r.price.score)+'">'+r.price.score+'</div><div class="cd-l">Pricing</div></div>':'')+'</div>';
var repCL=CL.filter(function(x){return x.rep===r.n}).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
if(repCL.length){h+='<div style="font-size:13px;font-weight:700;color:#c4880d;margin:16px 0 10px">1:1 Coaching Sessions ('+repCL.length+')</div>';repCL.forEach(function(x){h+=rLogEntry(x)})}
h+='</div>';return h}

// ===== REP ROSTER =====
function rRoster(){
var q=document.getElementById("search").value.trim().toLowerCase();
var fl=R.filter(function(r){if(q.length>=2)return r.n.toLowerCase().indexOf(q)>=0||r.r.toLowerCase().indexOf(q)>=0||(r.mg||"").toLowerCase().indexOf(q)>=0;return true});
var rc={SDR:0,AE:0,SE:0};R.forEach(function(r){if(rc[r.r]!==undefined)rc[r.r]++});
var h='<div class="cards"><div class="cd"><div class="cd-v" style="color:#1e2b35">'+R.length+'</div><div class="cd-l">Total Reps</div></div><div class="cd"><div class="cd-v" style="color:#2563a8">'+rc.SDR+'</div><div class="cd-l">SDRs</div></div><div class="cd"><div class="cd-v" style="color:#0f7b5f">'+rc.AE+'</div><div class="cd-l">AEs</div></div><div class="cd"><div class="cd-v" style="color:#7c3aed">'+rc.SE+'</div><div class="cd-l">SEs</div></div></div>';
h+='<div style="margin-bottom:16px;display:flex;gap:8px"><button class="bt bg" onclick="addNewRep()">+ Add New Employee</button></div>';
h+='<div class="tw"><table><thead><tr><th>Employee</th><th style="width:55px">Role</th><th style="width:110px">Manager</th><th style="text-align:right;width:70px">Calls</th><th style="text-align:right;width:55px">Avg</th><th style="text-align:right;width:55px">Opps</th><th style="width:60px">Status</th><th style="width:80px">Actions</th></tr></thead><tbody>';
fl.forEach(function(r){
var rb=r.r==="SDR"?"#2563a8":r.r==="AE"?"#1a6b54":"#7c3aed";
h+='<tr><td><div class="nc">'+av(r.n,28)+'<div style="font-weight:600;font-size:13px;color:#1e2b35">'+r.n+'</div></div></td>';
h+='<td><span class="bdg" style="background:'+rb+';font-size:9px;padding:2px 6px">'+r.r+'</span></td>';
h+='<td style="font-size:11px;color:#5a6b7a">'+(r.mg||"—")+'</td>';
h+='<td style="text-align:right;font-weight:600">'+r.total+'</td>';
h+='<td style="text-align:right">'+(r.avg?'<span class="bdg" style="background:'+scBg(r.avg)+'">'+r.avg+'</span>':'—')+'</td>';
h+='<td style="text-align:right;font-weight:500">'+r.opps+'</td>';
h+='<td style="font-size:11px;color:#5a6b7a">'+r.tl+'</td>';
h+='<td><div style="display:flex;gap:4px"><button class="bt bb2 bs" onclick="edRep('+r.id+')">Edit</button><button class="bt br bs" onclick="delRep('+r.id+')">×</button></div></td>';
h+='</tr>'});
h+='</tbody></table></div>';
return h}

// ADD NEW REP
function addNewRep(){
var nextId=R.reduce(function(m,x){return Math.max(m,x.id)},0)+1;
modal('<h2>Add New Employee</h2><div class="fg"><label>Full Name</label><input id="nr-n" placeholder="e.g. Jane Smith"/></div><div class="fr3"><div class="fg"><label>Role</label><select id="nr-r"><option value="SDR">SDR</option><option value="AE">AE</option><option value="SE">SE</option></select></div><div class="fg"><label>Manager</label><input id="nr-mg" placeholder="e.g. Avery Baccala"/></div><div class="fg"><label>Start Date</label><input id="nr-sd" placeholder="e.g. 4/14/2026"/></div></div><div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="svNewRep('+nextId+')">Save</button><button class="bt bo" onclick="clMo()">Cancel</button></div>')
}
function svNewRep(nextId){
var n=document.getElementById("nr-n").value.trim();
var r=document.getElementById("nr-r").value;
var mg=document.getElementById("nr-mg").value.trim();
var sd=document.getElementById("nr-sd").value.trim();
if(!n){alert("Enter employee name.");return}
var newRep={id:nextId,n:n,r:r,mg:mg,total:0,exc:0,good:0,nw:0,avg:0,gaps:["New hire","New hire","New hire"],trend:[null,null,null,null],tl:"New",opps:0,calls:0,themes:["New hire"],actions:["Onboarding"],obj:{tier:"—",score:0,type:"New hire"},price:{score:null,tier:null},vol:{total:0,mo:[null,null,null,null],eff:"New hire — "+sd}};
R.push(newRep);
repUpdateCloud(newRep);
try{localStorage.setItem("mv_reps",JSON.stringify(R))}catch(x){}
clMo();render()
}

// DELETE REP
function delRep(id){
var r=R.find(function(x){return x.id===id});
if(r&&confirm("Remove "+r.n+" from the roster?\n\nThis will NOT delete their coaching log entries.")){
R=R.filter(function(x){return x.id!==id});
try{localStorage.setItem("mv_reps",JSON.stringify(R))}catch(x){}
render()
}
}

// ===== REP EDIT =====
function edRep(id){
var r=R.find(function(x){return x.id===id});if(!r)return;
var h='<h2>Edit Rep Profile</h2>';
h+='<div class="fg"><label>Name</label><input id="rn" value="'+r.n.replace(/"/g,"&quot;")+'"/></div>';
h+='<div class="fr3"><div class="fg"><label>Role</label><select id="rr"><option'+(r.r==="SDR"?" selected":"")+'>SDR</option><option'+(r.r==="AE"?" selected":"")+'>AE</option><option'+(r.r==="SE"?" selected":"")+'>SE</option></select></div>';
h+='<div class="fg"><label>Manager</label><input id="rm" value="'+(r.mg||"")+'"/></div>';
h+='<div class="fg"><label>Start Date</label><input id="rsd" value="'+(r.sd||"")+'"/></div></div>';
h+='<div class="fg"><label>Trend Label</label><input id="rtl" value="'+r.tl+'"/></div>';
h+='<div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="svRep('+id+')">Save</button><button class="bt bo" onclick="clMo()">Cancel</button></div>';
modal(h)}
function svRep(id){
var r=R.find(function(x){return x.id===id});if(!r)return;
var oldName=r.n;
r.n=document.getElementById("rn").value.trim();
r.r=document.getElementById("rr").value;
r.mg=document.getElementById("rm").value.trim();
r.tl=document.getElementById("rtl").value.trim();
// Update coaching log if name changed
if(oldName!==r.n){CL.forEach(function(c){if(c.rep===oldName)c.rep=r.n})}
try{localStorage.setItem("mv_reps",JSON.stringify(R))}catch(x){}
clSave();clMo();render()}
function loadReps(){try{var a=localStorage.getItem("mv_reps");if(a){var saved=JSON.parse(a);saved.forEach(function(s){var r=R.find(function(x){return x.id===s.id});if(r){r.n=s.n;r.r=s.r;r.mg=s.mg;r.tl=s.tl}})}}catch(x){}}

// ===== MAIN RENDER =====
function render(){rTabs();var m=document.getElementById("main");
var q=document.getElementById("search").value.trim().toLowerCase();
if(q.length>=2){
var matches=R.filter(function(r){
var nameMatch=r.n.toLowerCase().indexOf(q)>=0;
var mgrMatch=(r.mg||"").toLowerCase().indexOf(q)>=0;
var roleMatch=r.r.toLowerCase().indexOf(q)>=0;
return nameMatch||mgrMatch||roleMatch;
});
if(matches.length>0&&matches.length<=12){
var searchType="profiles for";
if(matches.every(function(r){return r.n.toLowerCase().indexOf(q)<0}))searchType="reps matching";
var h='<div style="font-size:13px;color:#6b7a88;margin-bottom:16px">Showing '+matches.length+' result'+(matches.length>1?"s":"")+' for "'+q+'" <span style="cursor:pointer;color:#1a6b54;font-weight:600;margin-left:8px" onclick="document.getElementById(\'search\').value=\'\';render()">✕ Clear search</span></div>';
matches.forEach(function(r){h+=rProfile(r)});
m.innerHTML=h;return;
}
if(matches.length===0){
m.innerHTML='<div class="emp">No reps found matching "'+q+'". <span style="cursor:pointer;color:#1a6b54;font-weight:600" onclick="document.getElementById(\'search\').value=\'\';render()">✕ Clear</span></div>';
return;
}
}
if(T==="Overview")m.innerHTML=rOverview();
else if(T==="Call Coaching")m.innerHTML=rCoach();
else if(T==="Skills & Gaps")m.innerHTML=rSkills();
else if(T==="Trends")m.innerHTML=rTrends();
else if(T==="Coaching Plans")m.innerHTML=rPlans();
else if(T==="1:1 Log")m.innerHTML=rLog();
else if(T==="Rep Roster")m.innerHTML=rRoster()}

// SEARCH - wire up input event
var searchEl=document.getElementById("search");
searchEl.addEventListener("input",function(){render()});
searchEl.addEventListener("keyup",function(){render()});

function refreshData() {
  var btn = document.getElementById('refreshBtn');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; btn.textContent = '⟳ Refreshing...'; }
  R = []; COMPS = []; MO_DATA = []; DATA_LOADED = false;
  loadDashboardData(function() {
    render();
    clLoadCloud(function() { render(); });
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.textContent = '⟳ Refresh'; }
  });
}

// Load 1:1 log from localStorage immediately for instant display
clLoad();
// Load live rep + criteria data from Google Sheets, then render
loadDashboardData(function() {
  render();
  // Also refresh 1:1 log from cloud
  clLoadCloud(function() { render(); });
});
</script>
